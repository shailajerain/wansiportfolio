<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> CSS Flex Box</title>

<style>

.flex-2-items {
  display: flex;
}

.flex-2-items div:first-child {
  width: 200px;
  background: rgb(230, 94, 178);
}

.flex-2-items div:last-child {
  width: 75px;
  background: rgb(195, 82, 199);
}

.flex-3-items {
  display: flex;
}

.flex-3-items div:first-child {
  width: 50px;
  background: rgb(250, 124, 108);
}

.flex-3-items div:nth-child(2) {
  flex-grow: 1;
  width: 50px;
  background: rgb(61, 214, 125);
}

.flex-3-items div:last-child {
  width: 75px;
  background: rgb(54, 166, 201);
}

.flex-4-items {
  display: flex;
  justify-content: space-between;
  background-color: rgb(250, 250, 234);
}
.flex-4-items div {
  background: rgb(231, 199, 109);
  padding: 1px;
}

.flex-box-border, .flex-1-2-items {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 50px;
  border: 1px solid gray;
  padding: 10px;
}

.flex-1-2-items div {
  background: rgb(196, 47, 67);
  padding: 1px;
}

.container {
  display: flex;
  flex-direction: column;
}

.header, .footer {
  background: #f5ebb1;
  padding: 5px;
  min-height: 100px;
}

.main {
  display: flex;
  flex-direction: row;
}

.left, .right {
  flex: 1;
  padding: 10px;
  min-height: 200px;
  background: green;
  border: 5px solid yellow;
}

@media (min-width: 800px) {
  .main {
    flex-direction: row;
  }
}

@media (max-width: 400px) {
  .main {
    flex-direction: column;
  }

  .right {
    order: 1;
  }

  .left {
    order: 2;
  }
}

</style>
</head>

<body>

<h3>12a</h3>
<div class="flex-2-items">
  <div>200px</div>
  <div>75px</div>
</div>

<h3>12b</h3>
<div class="flex-3-items">
  <div>item1</div>
  <div>item2</div>
  <div>item3</div>
</div>

<h3>12c</h3>
<div class="flex-4-items">
  <div>item1</div>
  <div>item2</div>
  <div>item3</div>
  <div>item4</div>
</div>

<h3>12d</h3>
<div class="flex-box-border, flex-1-2-items">
  <div>item1</div>
  <div>item2</div>
</div>

<hr>

<h2>Responsive Layout</h2>

<div class="container">
  <div class="header">This is a Header</div>

  <div class="main">
    <div class="left">Section left-nav</div>
    <div class="right">Section right-nav</div>
  </div>

  <div class="footer">This is a footer</div>
</div>

</body>
</html>
